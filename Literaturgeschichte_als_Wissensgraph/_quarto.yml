project:
  type: book

book:
  title: "Literaturgeschichte als Wissensgraph"
  subtitle: "Automatische Erhebung literaturhistorisch relevanter Informationen aus Volltexten am Beispiel von französischen Romanen des XVIII. Jahrhunderts"
  author: "Julia Röttgermann"
  date: "2025.09.10"
  search: true
  repo-url: https://github.com/roettger/Thesis
  downloads: [pdf, epub]
  chapters:
  - index.qmd
  - chapter2_corpus.qmd
  - chapter3_themes.qmd
  - chapter4_spaces.qmd
  - chapter6_stylometry.qmd
  - summary.qmd
  - references.qmd
bibliography: references.bib
csl: DHd.csl
format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
  pdf:
    documentclass: scrreprt
    toc: true 
    include-in-header:
      text: |
        \usepackage{makeidx}
        \makeindex[intoc]
    include-after-body:
      text: |
        \printindex
    geometry: a4paper
    fontsize: 12pt